name: Feature Request
description: Propose a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests are triaged against the [OpenDeck Roadmap](https://github.com/users/thisis-romar/projects/4). Check there before filing.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this solve? Who is affected?
      placeholder: "As a developer building custom Stream Deck profiles, I can't easily..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature you'd like. API changes, new CLI flags, new tools, etc.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other solutions did you consider and why did you reject them?

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which area does this feature belong to?
      options:
        - Engine
        - MCP
        - Skills
        - Marketplace
        - Catalog
        - Docs
        - DevOps
        - Plugin
        - Distribution
        - Licensing
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Suggested priority
      options:
        - P0-Critical (blocking release)
        - P1-High (next sprint)
        - P2-Normal (backlog)
        - P3-Low (nice to have)
    validations:
      required: true

  - type: dropdown
    id: size
    attributes:
      label: Estimated size
      description: How much work do you think this is?
      options:
        - XS (< 1 day)
        - S (1–3 days)
        - M (1 week)
        - L (2 weeks)
        - XL (> 2 weeks)
        - Unknown

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this isn't a duplicate
          required: true
        - label: I'm willing to submit a PR for this feature
