name: Path denylist
on: [push, pull_request]

jobs:
  check-paths:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check denied paths
        run: |
          DENY='^(builds/|data/icons/generated/|.*\.streamDeckProfile$|profiles/[^/]+/private/|profiles/[^/]+-colored/|profiles/[^/]+-commercial/|originals/|data/shortcuts/.*\.paid\.json$)'
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}..HEAD)
          else
            CHANGED=$(git diff --name-only HEAD~1..HEAD 2>/dev/null || git ls-files)
          fi
          # Strip git quoting (spaces in filenames cause git to wrap paths in double-quotes)
          CHANGED_CLEAN=$(echo "$CHANGED" | tr -d '"')
          # Exempt the intentionally-tracked reference profile from the deny check
          VIOLATIONS=$(echo "$CHANGED_CLEAN" | grep -E "$DENY" | grep -v "Reference - All Actions" || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Commercial paths detected"
            echo "$VIOLATIONS"
            exit 1
          fi
